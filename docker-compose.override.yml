services:
  backend:
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      target: deps
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["./node_modules/.bin/next", "dev", "--hostname", "0.0.0.0", "--port", "3000"]
    environment:
      - NODE_ENV=development
